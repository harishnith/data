{% extends "base.html" %}
{% block content %}

<div class="top-header">
    <h2>Option Chain</h2>
</div>

<div class="chain-container">

    <div class="card chain-box">
        <h3>Nifty</h3>
        <div id="nifty-chain"></div>
    </div>

    <div class="card chain-box">
        <h3>BankNifty</h3>
        <div id="bank-chain"></div>
    </div>

    <div class="card chain-box">
        <h3>Sensex</h3>
        <div id="sensex-chain"></div>
    </div>

</div>

<script>
function formatOI(val) {
    if (val >= 1e9) return (val/1e9).toFixed(1) + "B";
    if (val >= 1e6) return (val/1e6).toFixed(1) + "M";
    if (val >= 1e3) return (val/1e3).toFixed(1) + "K";
    return val;
}

function render(id, data) {

    let maxCall = Math.max(...data.map(x => x.call));
    let maxPut = Math.max(...data.map(x => x.put));

    // 👉 CMP = middle row (11th row of 21)
    let cmpStrike = data[Math.floor(data.length / 2)].strike;

    let html = `
        <div class="chain-row header">
            <div>Call OI</div>
            <div>Strike</div>
            <div>Put OI</div>
        </div>
    `;

    data.forEach(row => {

        let callClass = "";
        let putClass = "";
        let strikeClass = "";

        // MAX CALL → RED BLINK
        if (row.call === maxCall) callClass = "max-call";

        // MAX PUT → GREEN BLINK
        if (row.put === maxPut) putClass = "max-put";

        // CMP → ONLY BLUE
        if (row.strike === cmpStrike) strikeClass = "cmp";

        html += `
        <div class="chain-row">
            <div class="${callClass}">${formatOI(row.call)}</div>
            <div class="${strikeClass}">${row.strike}</div>
            <div class="${putClass}">${formatOI(row.put)}</div>
        </div>`;
    });

    document.getElementById(id).innerHTML = html;
}

function loadChain() {
    fetch('/chain-data')
    .then(res => res.json())
    .then(d => {
        render("nifty-chain", d.nifty);
        render("bank-chain", d.bank);
        render("sensex-chain", d.sensex);
    });
}

// ✅ 3 MIN REFRESH
loadChain();
setInterval(loadChain, 180000);

</script>

{% endblock %}
