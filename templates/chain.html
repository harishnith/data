{% extends "base.html" %}
{% block content %}

<div class="top-header">
    <h2>Option Chain</h2>
</div>

<div class="chain-container">
    <div class="card"><h3>Nifty</h3><div id="nifty-chain"></div></div>
    <div class="card"><h3>BankNifty</h3><div id="bank-chain"></div></div>
    <div class="card"><h3>Sensex</h3><div id="sensex-chain"></div></div>
</div>

<script>
let prevData = {};

function formatOI(val) {
    if (val >= 1e6) return (val/1e6).toFixed(1)+"M";
    if (val >= 1e3) return (val/1e3).toFixed(1)+"K";
    return val;
}

function render(id, data) {

    let calls = data.map(x => x.call);
    let puts = data.map(x => x.put);

    let topCalls = [...calls].sort((a,b)=>b-a).slice(0,2);
    let topPuts = [...puts].sort((a,b)=>b-a).slice(0,2);

    let cmpStrike = data[Math.floor(data.length/2)].strike;

    let html = `
    <div class="chain-row header">
        <div>Call OI</div>
        <div>Strike</div>
        <div>Put OI</div>
    </div>`;

    data.forEach((row,i)=>{

        let callClass="";
        let putClass="";
        let strikeClass="";

        // 🔴 MAX + 🟠 SECOND CALL
        if(row.call===topCalls[0]) callClass="max-call";
        else if(row.call===topCalls[1]) callClass="second-call";

        // 🟢 MAX + 🟡 SECOND PUT
        if(row.put===topPuts[0]) putClass="max-put";
        else if(row.put===topPuts[1]) putClass="second-put";

        // 🔵 CMP ONLY
        if(row.strike===cmpStrike) strikeClass="cmp";

        // 🔥 BUILD-UP
        if(prevData[id] && prevData[id][i]){
            if(row.call > prevData[id][i].call) callClass+=" buildup";
            if(row.put > prevData[id][i].put) putClass+=" buildup";
        }

        html += `
        <div class="chain-row">
            <div class="${callClass}">${formatOI(row.call)}</div>
            <div class="${strikeClass}">${row.strike}</div>
            <div class="${putClass}">${formatOI(row.put)}</div>
        </div>`;
    });

    document.getElementById(id).innerHTML = html;
    prevData[id]=data;
}

function loadChain(){
    fetch('/chain-data')
    .then(r=>r.json())
    .then(d=>{
        render("nifty-chain", d.nifty);
        render("bank-chain", d.bank);
        render("sensex-chain", d.sensex);
    });
}

loadChain();
setInterval(loadChain,180000);
</script>

{% endblock %}
